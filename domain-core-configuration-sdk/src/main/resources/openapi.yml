components:
  schemas:
    TransactionCategoryDto:
      required:
      - categoryCode
      - categoryName
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
        categoryCode:
          minLength: 1
          type: string
        categoryName:
          minLength: 1
          type: string
        description:
          type: string
        parentCategoryId:
          type: string
          format: uuid
        svgIcon:
          type: string
    TitleDto:
      required:
      - prefix
      type: object
      properties:
        titleId:
          type: string
          format: uuid
        prefix:
          minLength: 1
          type: string
        description:
          type: string
        isActive:
          type: boolean
    RuleOperationTypeDto:
      required:
      - name
      - operationTypeCode
      type: object
      properties:
        operationTypeId:
          type: string
          format: uuid
        operationTypeCode:
          minLength: 1
          type: string
        name:
          minLength: 1
          type: string
        description:
          type: string
        isActive:
          type: boolean
    RelationshipTypeDto:
      required:
      - code
      type: object
      properties:
        relationshipTypeId:
          type: string
          format: uuid
        code:
          minLength: 1
          type: string
        description:
          type: string
    NotificationMessageDto:
      required:
      - messageCode
      - typeId
      type: object
      properties:
        messageId:
          type: string
          format: uuid
        messageCode:
          minLength: 1
          type: string
        typeId:
          type: string
          format: uuid
        eventType:
          type: string
        description:
          type: string
        defaultSubject:
          type: string
        defaultMessage:
          type: string
    NotificationMessageTemplateDto:
      required:
      - messageId
      - templateName
      type: object
      properties:
        templateId:
          type: string
          format: uuid
        messageId:
          type: string
          format: uuid
        templateName:
          minLength: 1
          type: string
        templateContent:
          type: string
        templateType:
          type: string
        version:
          type: string
    MessageTypeDto:
      required:
      - typeCode
      - typeName
      type: object
      properties:
        typeId:
          type: string
          format: uuid
        typeCode:
          minLength: 1
          type: string
        typeName:
          minLength: 1
          type: string
        description:
          type: string
    LookupItemDto:
      required:
      - domainId
      - itemCode
      - itemLabelDefault
      type: object
      properties:
        itemId:
          type: string
          format: uuid
        domainId:
          type: string
          format: uuid
        itemCode:
          minLength: 1
          type: string
        itemLabelDefault:
          minLength: 1
          type: string
        itemDesc:
          type: string
        parentItemId:
          type: string
          format: uuid
        sortOrder:
          type: integer
          format: int32
        effectiveFrom:
          type: string
          format: date
        effectiveTo:
          type: string
          format: date
        isCurrent:
          type: boolean
        extraJson:
          type: string
        tenantId:
          type: string
          format: uuid
    LookupDomainDto:
      required:
      - domainCode
      - domainName
      type: object
      properties:
        domainId:
          type: string
          format: uuid
        domainCode:
          minLength: 1
          type: string
        domainName:
          minLength: 1
          type: string
